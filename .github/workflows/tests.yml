name: tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22, 24, 26]

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node }}
      uses: actions/setup-node@v7
      with:
        node-version: ${{ matrix.node }}
    - run: npm ci
    - run: npm test
    - run: npm run coverage
